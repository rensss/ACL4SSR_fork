name: Merge Upstream

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 时间 2 点运行（北京时间 10 点）
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with token
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set Git Config
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/ACL4SSR/ACL4SSR.git
          git fetch upstream

      - name: Merge upstream/master into current branch
        run: |
          # 1. 尝试以 --no-commit 方式进行合并
          git merge upstream/master --allow-unrelated-histories --no-commit -m "Merge upstream" || {
            echo "合并遇到冲突，尝试自动恢复或报错..."
            exit 1
          }
          
          # 2. 如果检测到有 .github/workflows/ 目录中的文件变动，则将其恢复为 HEAD 状态，避免因 GITHUB_TOKEN 无 workflow 权限而导致推送失败
          if git diff --cached --name-only | grep -q "^\.github/workflows/"; then
            echo "检测到 Upstream 更新了工作流文件！正在将其恢复为本地版本以避免推送权限错误..."
            git checkout HEAD -- .github/workflows/
          fi
          
          # 3. 提交合并
          git commit -m "Merge upstream (automatically resolved and kept local workflows)" || echo "没有需要提交的变更"

      - name: Push to origin
        run: |
          git push origin HEAD:master
